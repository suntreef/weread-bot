<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信读书 V2.0 控制台</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; font-size: 14px; color: #333; }
        .hint { font-size: 12px; color: #888; margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; background: #fafafa; }
        button { border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; margin-bottom: 10px; font-weight: bold; color: white; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-check { background-color: #ff9900; }
        .btn-save { background-color: #0052cc; }
        .btn-run { background-color: #36b37e; }
        .btn-clear { background-color: #ff5252; width: auto; padding: 6px 12px; font-size: 12px; float: right; margin-bottom: 0; }
        #qr-section { margin-top: 20px; text-align: center; border: 2px dashed #ff9900; padding: 20px; border-radius: 8px; }
        img { max-width: 200px; border-radius: 8px; }
        .log-header { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; }
        #log-box { width: 100%; height: 250px; background: #1e1e1e; color: #00ff00; font-family: 'Courier New', Courier, monospace; padding: 12px; border-radius: 6px; overflow-y: scroll; box-sizing: border-box; font-size: 13px; margin-top: 10px; border: none; outline: none; resize: vertical; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 15px;">📚 微信读书 V2.0 Pro</h2>
        
        <button class="btn-check" onclick="checkLogin()">1. 检测登录状态 / 获取二维码</button>
        
        {% if qr_exists %}
        <div id="qr-section">
            <h3 style="color: #ff9900; margin-top:0;">请在微信扫码</h3>
            <img src="/data/qrcode.png?t={{ range(1, 10000) | random }}" alt="请扫码">
        </div>
        {% endif %}

        <div style="margin-top: 20px;">
            <div class="form-group">
                <label>📚 指定书籍链接 (留空则自动从书架选书)</label>
                <input type="text" id="book_url" value="{{ config.book_url }}" placeholder="https://weread.qq.com/web/reader/...">
            </div>
            <div class="form-group">
                <label>⏱️ 每次阅读时长 (分钟)</label>
                <input type="number" id="reading_minutes" value="{{ config.reading_minutes }}">
            </div>
            <div class="form-group">
                <label>⏰ 每日执行时间</label>
                <input type="time" id="schedule_time" value="{{ config.schedule_time }}">
            </div>
            <div class="form-group">
                <label>📢 PushPlus 推送 Token (可选)</label>
                <span class="hint">关注微信公众号 PushPlus 即可获取 Token，实现执行结果微信推送。</span>
                <input type="text" id="push_token" value="{{ config.push_token }}" placeholder="留空则不推送">
            </div>
        </div>
        
        <button class="btn-save" onclick="saveConfig()">2. 保存配置并生效定时任务</button>
        <button class="btn-run" onclick="runNow()">3. 立即执行一次阅读任务</button>

        <div class="log-header">
            <h4 style="margin: 0; color: #555;">实时终端日志</h4>
            <button class="btn-clear" onclick="clearLogs()">清空日志</button>
        </div>
        <textarea id="log-box" readonly></textarea>
    </div>

    <script>
        function checkLogin() { fetch('/api/check_login', { method: 'POST' }).then(res => res.json()).then(data => alert(data.message)); }
        
        function saveConfig() {
            fetch('/api/save', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ book_url: document.getElementById('book_url').value, reading_minutes: document.getElementById('reading_minutes').value, schedule_time: document.getElementById('schedule_time').value, push_token: document.getElementById('push_token').value })
            }).then(res => res.json()).then(data => alert(data.message));
        }
        
        function runNow() { fetch('/api/run_now', { method: 'POST' }).then(res => res.json()).then(data => alert(data.message)); }

        function clearLogs() { fetch('/api/clear_logs', { method: 'POST' }).then(res => res.json()).then(data => { document.getElementById('log-box').value = ''; alert(data.message); }); }

        setInterval(() => {
            fetch('/api/get_logs').then(res => res.json()).then(data => {
                const box = document.getElementById('log-box');
                if(box.value !== data.logs) { box.value = data.logs; box.scrollTop = box.scrollHeight; }
            });
        }, 2000);
    </script>
</body>
</html>
